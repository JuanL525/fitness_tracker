name: fitness_tracker
description: App de fitness con plugins oficiales y historial local
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Iconos Material (Icons.*) y Cupertino (CupertinoIcons.*)
  cupertino_icons: ^1.0.8

  # Gestión de estado
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Inyección de dependencias
  get_it: ^7.6.4

  # Manejo de permisos
  permission_handler: ^11.0.1

  # Hardware y sensores (plugins oficiales)
  local_auth: ^2.3.0
  geolocator: ^13.0.2
  sensors_plus: ^6.1.1
  flutter_tts: ^4.2.0

  # Persistencia local (CRUD de sesiones)
  sqflite: ^2.4.1
  path_provider: ^2.1.5

  # UI
  percent_indicator: ^4.2.3
  flutter_lucide: ^1.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  # Incluye la fuente Material Icons (evita cuadros con X en Icon(Icons.*))
  uses-material-design: true
