name: fitness_tracker
description: App de fitness con Platform Channels
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Iconos Material (Icons.*) y Cupertino (CupertinoIcons.*)
  cupertino_icons: ^1.0.8

  # Gestión de estado
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Inyección de dependencias
  get_it: ^7.6.4

  # Manejo de permisos
  permission_handler: ^11.0.1

  # MEGA RETO: sensores y síntesis de voz
  sensors_plus: ^6.1.1
  flutter_tts: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  # Incluye la fuente Material Icons (evita cuadros con X en Icon(Icons.*))
  uses-material-design: true
